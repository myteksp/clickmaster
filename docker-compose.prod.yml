services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clicker
      POSTGRES_USER: clicker
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clicker_secure_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/clicker
      SPRING_DATASOURCE_USERNAME: clicker
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-clicker_secure_2024}
      ASOCKS_API_KEY: ${ASOCKS_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-prod-secret-change-me-at-least-256-bits-long-for-hs256}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
