services:
  postgres:
    image: postgres:16-alpine
    container_name: clicker-db
    environment:
      POSTGRES_DB: clicker
      POSTGRES_USER: clicker
      POSTGRES_PASSWORD: clicker
    ports:
      - "5433:5432"
    volumes:
      - clicker-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clicker -d clicker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clicker-pgdata:
